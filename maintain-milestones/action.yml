name: maintain-milestones
description: "Maintain rolling monthly milestones in a target repository"
author: "Vishal Koparde"

inputs:
  target_repo:
    description: "Target repository (excluding the owner). Defaults to the current repo."
    required: false
    default: ""
  owner:
    description: "Owner of the repository. Defaults to the current repository owner."
    required: false
    default: ""
  dry_run:
    description: "Toggle dry run mode. If true, report changes without applying them."
    required: false
    default: "false"
  max_updates_per_run:
    description: "Maximum milestone updates/creates/closes/reopens per run"
    required: false
    default: "100"
  github-token:
    description: "GitHub Actions token with access to organization projects. Optional - set the app-id and app-private-key instead."
    required: false
    default: ""
  app-id:
    description: "GitHub App ID for authentication. Optional - Use this instead of a token."
    required: false
    default: ""
  app-private-key:
    description: "Private key for the GitHub App used for authentication. Optional - Use this instead of a token. Must be set if app-id is set."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: set owner & repo
      shell: bash
      run: |
        TARGET_REPO="${{ inputs.target_repo }}"
        OWNER="${{ inputs.owner }}"

        if [ -z "$TARGET_REPO" ]; then
          TARGET_REPO="${{ github.event.repository.name }}"
        fi

        if [ -z "$OWNER" ]; then
          OWNER="${{ github.repository_owner }}"
        fi

        echo "TARGET_REPO=$TARGET_REPO" >> $GITHUB_ENV
        echo "OWNER=$OWNER" >> $GITHUB_ENV

    - name: Generate a token
      id: generate-token
      if: ${{ inputs.github-token == '' }}
      uses: actions/create-github-app-token@v3
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.app-private-key }}
        owner: ${{ env.OWNER }}

    - name: Archive old milestones and ensure current cadence
      uses: actions/github-script@v8
      env:
        TARGET_REPO: ${{ env.TARGET_REPO }}
        OWNER: ${{ env.OWNER }}
        DRY_RUN: ${{ inputs.dry_run }}
        MAX_UPDATES: ${{ inputs.max_updates_per_run }}
      with:
        github-token: ${{ inputs.github-token != '' && inputs.github-token || steps.generate-token.outputs.token }}
        script: |
          const owner = (process.env.OWNER || context.repo.owner).trim();
          const repo = (process.env.TARGET_REPO || context.repo.repo).trim();
          const dryRunRaw = String(process.env.DRY_RUN || 'false').trim().toLowerCase();
          if (dryRunRaw !== 'true' && dryRunRaw !== 'false') {
            core.setFailed(
              `Invalid dry_run value: "${process.env.DRY_RUN}". ` +
              'Use one of: true, false.'
            );
            return;
          }
          const dryRun = dryRunRaw === 'true';
          const maxUpdatesRaw = Number(process.env.MAX_UPDATES || '100');
          const maxUpdates = Number.isFinite(maxUpdatesRaw) && maxUpdatesRaw > 0
            ? Math.floor(maxUpdatesRaw)
            : 100;

          if (!owner || !repo) {
            core.setFailed(
              `Invalid inputs. owner="${owner}" repo="${repo}". ` +
              'Set owner and target_repo to non-empty values.'
            );
            return;
          }

          if (repo.includes('/')) {
            core.setFailed(
              `Invalid target_repo: "${repo}". ` +
              'Use repo name only (for example: actions), not owner/repo.'
            );
            return;
          }

          const now = new Date();
          const currentYear = now.getUTCFullYear();
          const nextYear = currentYear + 1;

          const toTitle = (year, month) => `${year}-${String(month).padStart(2, '0')}`;
          const isMonthlyTitle = (title) => /^\d{4}-\d{2}$/.test(title || '');
          const getYearMonth = (title) => {
            const [y, m] = title.split('-').map((v) => Number(v));
            return { year: y, month: m };
          };
          const isValidMonth = (month) => month >= 1 && month <= 12;
          const lastDayOfMonth = (year, month) => {
            // month is 1..12; Date.UTC month index is 0..11; day 0 gives previous month's last day.
            return new Date(Date.UTC(year, month, 0)).getUTCDate();
          };
          const dueDateOnly = (year, month) => {
            const day = String(lastDayOfMonth(year, month)).padStart(2, '0');
            return `${year}-${String(month).padStart(2, '0')}-${day}`;
          };
          // Use midday UTC to avoid date shifting to the previous day in western timezones.
          const dueOnPayload = (dateOnly) => `${dateOnly}T12:00:00Z`;
          const dueOnDateOnly = (dueOn) => (dueOn ? String(dueOn).slice(0, 10) : null);

          const desiredTitles = new Set();
          for (let month = 1; month <= 12; month += 1) {
            desiredTitles.add(toTitle(currentYear, month));
          }
          desiredTitles.add(toTitle(nextYear, 1));

          const milestones = await github.paginate(github.rest.issues.listMilestones, {
            owner,
            repo,
            state: 'all',
            per_page: 100,
          });

          const byTitle = new Map();
          for (const ms of milestones) {
            byTitle.set(ms.title, ms);
          }

          const plan = [];
          const addPlan = (kind, title, details = {}) => {
            plan.push({ kind, title, ...details });
          };

          for (const ms of milestones) {
            if (!isMonthlyTitle(ms.title)) {
              continue;
            }
            const { year, month } = getYearMonth(ms.title);
            if (!Number.isInteger(year) || !Number.isInteger(month) || !isValidMonth(month)) {
              continue;
            }

            if (year < currentYear && ms.state === 'open') {
              // Keep milestones from the immediately prior year open until May of the current year for Performance Reviews.
              const currentMonth = now.getUTCMonth() + 1; // getUTCMonth() is 0-indexed
              const isPriorYear = year === currentYear - 1;
              if (!isPriorYear || currentMonth >= 5) {
                addPlan('close_old', ms.title, { milestone_number: ms.number });
              }
            }
          }

          for (const title of desiredTitles) {
            const { year, month } = getYearMonth(title);
            const expectedDueDate = dueDateOnly(year, month);
            const expectedDueOn = dueOnPayload(expectedDueDate);
            const existing = byTitle.get(title);

            if (!existing) {
              addPlan('create', title, { due_on: expectedDueOn });
              continue;
            }

            if (existing.state === 'closed') {
              addPlan('reopen', title, { milestone_number: existing.number });
            }

            const existingDateOnly = dueOnDateOnly(existing.due_on);
            if (existingDateOnly !== expectedDueDate) {
              addPlan('set_due_date', title, {
                milestone_number: existing.number,
                due_on: expectedDueOn,
                from_due_on: existing.due_on,
              });
            }
          }

          if (plan.length > maxUpdates) {
            core.setFailed(
              `Planned ${plan.length} updates, exceeding max_updates_per_run=${maxUpdates}. ` +
              'Increase input or run again after partial cleanup.'
            );
            return;
          }

          const results = [];
          const runOrLog = async (action, fn) => {
            if (dryRun) {
              results.push({ ...action, status: 'planned' });
              return;
            }
            await fn();
            results.push({ ...action, status: 'applied' });
          };

          for (const action of plan) {
            if (action.kind === 'close_old') {
              await runOrLog(action, async () => {
                await github.rest.issues.updateMilestone({
                  owner,
                  repo,
                  milestone_number: action.milestone_number,
                  state: 'closed',
                });
              });
              continue;
            }

            if (action.kind === 'create') {
              await runOrLog(action, async () => {
                await github.rest.issues.createMilestone({
                  owner,
                  repo,
                  title: action.title,
                  due_on: action.due_on,
                  state: 'open',
                });
              });
              continue;
            }

            if (action.kind === 'reopen') {
              await runOrLog(action, async () => {
                await github.rest.issues.updateMilestone({
                  owner,
                  repo,
                  milestone_number: action.milestone_number,
                  state: 'open',
                });
              });
              continue;
            }

            if (action.kind === 'set_due_date') {
              await runOrLog(action, async () => {
                await github.rest.issues.updateMilestone({
                  owner,
                  repo,
                  milestone_number: action.milestone_number,
                  due_on: action.due_on,
                });
              });
            }
          }

          const lines = [];
          lines.push(`Target repository: ${owner}/${repo}`);
          lines.push(`Current UTC year: ${currentYear}`);
          lines.push(`Dry run: ${dryRun}`);
          lines.push(`Max updates per run: ${maxUpdates}`);
          lines.push(`Planned changes: ${plan.length}`);
          lines.push('');

          if (results.length === 0) {
            lines.push('No changes needed.');
          } else {
            lines.push('| Action | Milestone | Status |');
            lines.push('|---|---|---|');
            for (const r of results) {
              lines.push(`| ${r.kind} | ${r.title} | ${r.status} |`);
            }
          }

          core.summary.addCodeBlock(lines.join('\n')).write();
          core.info(lines.join('\n'));
