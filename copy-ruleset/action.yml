name: "Copy Ruleset"
author: "Kelly Sovacool"

description: |
  Copy a repository ruleset from one GitHub repository to another.

branding:
  icon: copy
  color: purple

inputs:
  source-repo:
    description: "Source repository in owner/repo format."
    required: true
  target-repo:
    description: "Target repository in owner/repo format."
    required: true
  ruleset-name:
    description: "Name of the ruleset to copy."
    required: true
  token:
    description: "GitHub token with repo scope on both repositories."
    required: false
    default: "${{ github.token }}"
  python-version:
    description: "The version of Python to install."
    required: false
    default: "3.11"
  ccbr-actions-version:
    description: "The version of ccbr_actions to use."
    required: false
    default: "main"

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v6
      with:
        python-version: "${{ inputs.python-version }}"

    - name: Install ccbr_actions
      shell: bash
      run: python -m pip install --upgrade pip "git+https://github.com/CCBR/actions.git@${{ inputs.ccbr-actions-version }}"

    - name: Copy ruleset
      shell: python
      env:
        GH_TOKEN: "${{ inputs.token }}"
        SOURCE_REPO: "${{ inputs.source-repo }}"
        TARGET_REPO: "${{ inputs.target-repo }}"
        RULESET_NAME: "${{ inputs.ruleset-name }}"
      run: |
        import os
        from ccbr_actions.github import copy_ruleset

        result = copy_ruleset(
          source_repo=os.environ["SOURCE_REPO"],
          target_repo=os.environ["TARGET_REPO"],
          ruleset_name=os.environ["RULESET_NAME"],
          token=os.environ.get("GH_TOKEN", ""),
        )
        print(f"Ruleset '{result['name']}' (id={result['id']}) created in {os.environ['TARGET_REPO']}.")
