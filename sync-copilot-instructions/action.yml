name: sync-copilot-instructions
description: "Sync Copilot instructions from a source repository to a target repository and open a PR"
author: "Kelly Sovacool & Vishal Koparde"

inputs:
  owner:
    description: "Owner of the target repository."
    required: true
  repo:
    description: "Name of the target repository."
    required: true
  app-id:
    description: "GitHub App ID used to generate an installation token."
    required: true
  app-private-key:
    description: "GitHub App private key used to generate an installation token."
    required: true
  source-repository:
    description: "Source repository containing canonical Copilot instructions."
    required: true
    default: CCBR/.github
  source-ref:
    description: "Branch, tag, or SHA in source repository."
    required: true
    default: main
  source-file:
    description: "Path to canonical instructions file in source repository."
    required: true
    default: .github/copilot-instructions.md
  target-file:
    description: "Path to destination instructions file in target repository."
    required: true
    default: .github/copilot-instructions.md
  commit-message:
    description: "Commit message used when sync updates are detected."
    required: true
    default: "chore: 🤖 sync copilot instructions"
  branch:
    description: "Branch name to use for the sync pull request."
    required: true
    default: update-copilot-instructions

runs:
  using: composite
  steps:
    - name: Generate a token
      id: generate-token
      uses: actions/create-github-app-token@v2
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.app-private-key }}
        owner: ${{ inputs.owner }}

    - name: Checkout target repo
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        persist-credentials: true
        repository: ${{ inputs.owner }}/${{ inputs.repo }}
        token: ${{ steps.generate-token.outputs.token }}

    - name: Update copilot instructions
      shell: bash
      env:
        SOURCE_URL: https://raw.githubusercontent.com/${{ inputs.source-repository }}/${{ inputs.source-ref }}/${{ inputs.source-file }}
        TARGET_FILE: ${{ inputs.target-file }}
        COMMIT_MESSAGE: ${{ inputs.commit-message }}
        GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        BRANCH: ${{ inputs.branch }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git switch -C "$BRANCH"
        mkdir -p "$(dirname "$TARGET_FILE")"
        wget "$SOURCE_URL" -O "$TARGET_FILE"
        git add "$TARGET_FILE"
        git commit -m "$COMMIT_MESSAGE" || echo "nothing to commit"
        git push -u origin "$BRANCH" || echo "nothing to push"
        gh pr create --title "$COMMIT_MESSAGE" --body "Sync Copilot instructions from $SOURCE_URL" || echo "PR unsuccessful"
