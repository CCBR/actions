name: maintain-milestones

on:
  schedule:
    - cron: "47 3 1 1 *" # January 1st at 03:47 UTC
    - cron: "47 3 1 5 *" # May 1st at 03:47 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: Toggle dry run mode. If true, report changes without applying them.
        type: boolean
        required: false
        default: true
      max_updates_per_run:
        description: Maximum milestone updates/creates/closes/reopens per run
        required: false
        default: "100"

permissions:
  contents: read
  issues: write

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.load-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Load matrix from ${{ github.workspace }}/.github/repos.json
        id: load-matrix
        run: |
          matrix=$(jq -c '{include: [(.owners | to_entries[] | .key as $owner | .value[] | {OWNER: $owner, REPO: .})]}' .github/repos.json)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  maintain-milestones:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    steps:
      - uses: CCBR/actions/maintain-milestones@main
        with:
          github-token: ${{ secrets.repo_token || '' }}
          owner: ${{ matrix.OWNER }}
          target_repo: ${{ matrix.REPO }}
          dry_run: ${{ inputs.dry_run && 'true' || 'false' }}
          max_updates_per_run: ${{ inputs.max_updates_per_run || '100' }}
          app-id: ${{ vars.CCBR_BOT_APP_ID }}
          app-private-key: ${{ secrets.CCBR_BOT_PRIVATE_KEY }}
