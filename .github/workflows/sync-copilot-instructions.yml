name: sync-copilot-instructions

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-copilot-instructions:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        OWNER: [CCBR]
        REPO:
          - actions
          - ASPEN
          - CARLISLE
          - CCBR_tobias
          - ccbrpipeliner
          - CHAMPAGNE
          - CHARLIE
          - CRISPIN
          - dockers2
          - ESCAPE
          - HowTos
          - journal-club
          - LOGAN
          - MOSuite
          - MOSuite-Nextflow
          - nf-modules
          - parkit
          - RENEE
          - SCOT
          - SINCLAIR
          - spacesavers2
          - SPENCER
          - spook
          - Tools
          - TRANQUIL
          - XAVIER

    steps:
      - name: Checkout actions repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Sync Copilot instructions
        uses: ./sync-copilot-instructions
        with:
          owner: ${{ matrix.OWNER }}
          repo: ${{ matrix.REPO }}
          app-id: ${{ vars.CCBR_BOT_APP_ID }}
          app-private-key: ${{ secrets.CCBR_BOT_PRIVATE_KEY }}
          source-repository: "CCBR/.github"
          source-ref: "main"
          source-file: ".github/copilot-instructions.md"
          target-file: ".github/copilot-instructions.md"
          commit-message: "chore: 🤖 sync copilot instructions"
