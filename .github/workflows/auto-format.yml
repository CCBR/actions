name: auto-format

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auto-format:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.CCBR_BOT_APP_ID }}
          private-key: ${{ secrets.CCBR_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@v6
        if: github.event_name == 'pull_request'
        with:
          token: ${{ steps.generate-token.outputs.token }}
          fetch-depth: 0
          ref: ${{ github.head_ref }}
      - uses: actions/checkout@v6
        if: github.event_name != 'pull_request'
        with:
          token: ${{ steps.generate-token.outputs.token }}
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install .[dev,docs] --upgrade pip
      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.4.515

      - name: quarto render readme files
        run: |
          for f in README.qmd **/README.qmd; do quarto render $f; done

      - uses: citation-file-format/cffconvert-github-action@2.0.0
        if: ${{ hashFiles('CITATION.cff') != ''}}
        with:
          args: "--format codemeta --outfile codemeta.json"

      - name: pre-commit
        uses: pre-commit/action@v3.0.1
        continue-on-error: true

      - name: black
        uses: psf/black@stable
        with:
          options: "--verbose"
          use_pyproject: true

      - name: commit & push
        run: |
          git config --global user.name "CCBR-bot"
          git config --global user.email "258092125+ccbr-bot@users.noreply.github.com"
          git add .
          git commit -m "ci: 🤖 render readme & format everything with pre-commit" && git push || echo "nothing to commit"
