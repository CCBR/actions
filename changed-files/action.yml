name: "Changed Files"
author: "Kelly Sovacool"
# Adapted from https://github.com/knu/changed-files/tree/67e0b182dc3c38aec6b2ea31748f1b413c0dda7d

description: |
  Get a list of changed files and filter them by a list of path patterns similar to .gitignore

branding:
  icon: list
  color: purple

inputs:
  paths:
    description: Pattern list in the .gitignore syntax to match against changed files
    required: false
  token:
    description: GitHub token used for `gh api` calls
    required: false
    default: "${{ github.token }}"
  python-version:
    description: The version of Python to install
    required: false
    default: "3.11"
  ccbr-actions-version:
    description: The version of ccbr_actions to use
    required: false
    default: "main"
  comparison-mode:
    description: |
      Comparison mode for collecting changed files.
      - latest-commit (default): for pull_request, compare head^...head (latest commit only)
      - event: compare full event range (PR base...head or push before...after)
    required: false
    default: "latest-commit"

outputs:
  changed_files:
    description: A multi-line string containing the list of changed files.
    value: ${{ steps.get-changed-files.outputs.changed_files }}
  changed_files_json:
    description: A JSON string containing the list of changed files.
    value: ${{ steps.get-changed-files.outputs.changed_files_json }}
  matched_files:
    description: A multi-line string containing the list of changed files matching `paths` patterns.  Empty ("") if `paths` is not given.
    value: ${{ steps.get-changed-files.outputs.matched_files }}
  matched_files_json:
    description: A JSON string containing the list of changed files matching `paths` patterns.  Empty ("[]") if `paths` is not given.
    value: ${{ steps.get-changed-files.outputs.matched_files_json }}
  error:
    description: Error message if changed file collection fails. Empty on success.
    value: ${{ steps.get-changed-files.outputs.error }}

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v6
      with:
        python-version: "${{ inputs.python-version }}"

    - name: Install ccbr_actions
      shell: bash
      run: python -m pip install --upgrade pip "git+https://github.com/CCBR/actions.git@${{ inputs.ccbr-actions-version }}"

    - id: get-changed-files
      name: Get Changed Files
      env:
        GH_TOKEN: "${{ inputs.token }}"
        PATHS: ${{ inputs.paths }}
        EVENT_NAME: ${{ github.event_name }}
        COMPARISON_MODE: ${{ inputs.comparison-mode }}
        REPOSITORY: ${{ github.repository }}
        BEFORE: ${{ github.event.before }}
        AFTER: ${{ github.event.after }}
        PR_BASE_REPO_FULL_NAME: ${{ github.event.pull_request.base.repo.full_name }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PR_HEAD_LABEL: ${{ github.event.pull_request.head.label }}
        PR_HEAD_REPO_FULL_NAME: ${{ github.event.pull_request.head.repo.full_name }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: |
        import json
        import os
        from ccbr_actions.actions import set_output
        from ccbr_actions.changed_files import get_changed_files

        def emit_outputs(payload):
          set_output("changed_files", payload.get("changed_files", ""))
          set_output("changed_files_json", payload.get("changed_files_json", "[]"))
          set_output("matched_files", payload.get("matched_files", ""))
          set_output("matched_files_json", payload.get("matched_files_json", "[]"))
          set_output("error", payload.get("error", ""))

        try:
          result = get_changed_files(
            paths=os.environ.get("PATHS", ""),
            event_name=os.environ.get("EVENT_NAME", ""),
            comparison_mode=os.environ.get("COMPARISON_MODE", "latest-commit"),
            repository=os.environ.get("REPOSITORY", ""),
            before=os.environ.get("BEFORE", ""),
            after=os.environ.get("AFTER", ""),
            pr_base_repo_full_name=os.environ.get("PR_BASE_REPO_FULL_NAME", ""),
            pr_base_sha=os.environ.get("PR_BASE_SHA", ""),
            pr_head_label=os.environ.get("PR_HEAD_LABEL", ""),
            pr_head_repo_full_name=os.environ.get("PR_HEAD_REPO_FULL_NAME", ""),
            pr_head_sha=os.environ.get("PR_HEAD_SHA", ""),
            token=os.environ.get("GH_TOKEN", ""),
          )
          payload = json.loads(result)
          payload["error"] = ""
          emit_outputs(payload)
        except Exception as exc:
          event_name = os.environ.get("EVENT_NAME", "")
          comparison_mode = os.environ.get("COMPARISON_MODE", "")
          repository = os.environ.get("REPOSITORY", "")
          error_message = (
            "changed-files action failed while collecting changed files. "
            f"event_name={event_name}, comparison_mode={comparison_mode}, repository={repository}. "
            "Check token permissions and that base/head refs are accessible. "
            f"Original error: {exc}"
          )
          fallback = {
            "changed_files": "",
            "changed_files_json": "[]",
            "matched_files": "",
            "matched_files_json": "[]",
            "error": error_message,
          }
          set_output("result", json.dumps(fallback))
          emit_outputs(fallback)
          print(f"::error::{error_message}")
          raise
      shell: python
